  <div class="login-page">
    <div class="login-container">
      <div class="login-header">
        <div class="login-brand">CF</div>
        <h1>资金预测</h1>
        <p class="login-subtitle-en">Cash flow forecasting</p>
        <p class="login-subtitle-zh">司库工作台 · 选择身份进入</p>
        <p class="login-skip" style="margin-top:12px;font-size:13px;">
          <a href="/accio/" style="color:var(--primary);font-weight:600;">直接进入亿流 Work 工作台</a>
          <span style="color:var(--text-muted);font-size:12px;margin-left:8px;">站点根路径 <code style="font-size:11px;">/</code> 也会跳转到此处</span>
        </p>
        <p class="login-skip" style="margin-top:8px;font-size:13px;">
          <a href="app?embed=1" style="color:var(--text-muted);font-weight:500;">全栈内嵌工作台（旧入口）</a>
        </p>
      </div>
      <div class="role-grid" id="role-grid"></div>
      <div class="login-footer">亿流科技 · 司库智能化解决方案</div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      var grid = document.getElementById('role-grid');
      var roles = AppData.roles;
      Object.keys(roles).forEach(function (rid) {
        var r = roles[rid];
        var card = document.createElement('button');
        card.type = 'button';
        card.className = 'role-card';
        card.dataset.role = rid;
        card.setAttribute('aria-label', r.name + ' - ' + r.desc);
        var svg = (window.AppData.roleSvg && window.AppData.roleSvg[rid]) || '';
        card.innerHTML =
          '<div class="role-icon" aria-hidden="true">' + svg + '</div>' +
          '<div class="role-card-body">' +
          '<div class="role-name">' + r.name + '</div>' +
          '<div class="role-desc">' + r.desc + '</div>' +
          '</div>';
        card.addEventListener('click', function () { Auth.login(rid); });
        grid.appendChild(card);
      });
    })();
  </script>

<script>
(function(){'use strict';var T={wb:'03-资金预测-Accio风格工作台/index.html',brd:'01-文档-现金流预测/资金预测-业务需求说明书-BRD.html',prd:'01-文档-现金流预测/资金预测-产品需求说明书-PRD.html',ppt:'02-工程-现金流预测-全栈系统/PPT/brief-v2.html',fe:'02-工程-现金流预测-全栈系统/frontend/index.html',mvp:'04-司库流动性预测-MVP/web/index.html',site:'05-亿流AI平台-官网/index.html'};function pf(){var pathname=decodeURIComponent(location.pathname||'').replace(/\\/g,'/');var p=pathname.split('/').filter(Boolean);var r=-1;for(var i=0;i<p.length;i++){if(/^0[1-5]-/.test(p[i])){r=i-1;break;}}if(r<0){for(var j=0;j<p.length;j++){if(p[j].indexOf('完整交付包')!==-1){r=j;break;}}}if(r<0)return'';var d=p.slice(r+1,-1);return d.length?d.map(function(){return'..';}).join('/')+'/':'';}function go(){var P=pf();document.querySelectorAll('a[data-yl]').forEach(function(a){var k=a.getAttribute('data-yl');if(!T[k])return;try{a.href=new URL(P+T[k],location.href).href;}catch(e){a.href=P+T[k];}});document.querySelectorAll('a[data-yl]').forEach(function(a){a.onmouseover=function(){this.style.background='rgba(243,110,33,.1)';this.style.color='#e8541b';};a.onmouseout=function(){this.style.background='none';this.style.color='#555';};});var b=document.getElementById('_ylT');if(b){b.onmouseover=function(){this.style.color='#e8541b';};b.onmouseout=function(){this.style.color='#888';};}}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',go);else go();})();
